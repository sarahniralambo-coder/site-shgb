<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Société Historique du Grand-Bouctouche</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>



  <!-- Thumbnail for bundler splash -->
  <template id="__bundler_thumbnail" data-bg-color="#1C1408">
    <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <!-- Background -->
      <rect width="400" height="400" fill="#1C1408"/>
      <!-- Gold circle medallion -->
      <circle cx="200" cy="170" r="90" fill="none" stroke="#C49A2A" stroke-width="3"/>
      <circle cx="200" cy="170" r="82" fill="#F5EFDF" opacity="0.12"/>
      <!-- Gold star -->
      <text x="200" y="183" text-anchor="middle" font-size="48" fill="#C49A2A" font-family="serif">✦</text>
      <!-- Gold divider line -->
      <line x1="100" y1="285" x2="300" y2="285" stroke="#C49A2A" stroke-width="1" opacity="0.6"/>
      <!-- Title text placeholder lines -->
      <rect x="120" y="300" width="160" height="8" rx="2" fill="#F5EFDF" opacity="0.4"/>
      <rect x="140" y="316" width="120" height="6" rx="2" fill="#C49A2A" opacity="0.4"/>
    </svg>
  </template>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #F5EFDF; font-family: 'Lora', serif; color: #1C1408; overflow-x: hidden; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <style id="__logo_style">
    :root { --logo-url: url('logo.png'); }
  </style>


  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Tokens ────────────────────────────────────────────────────────────────
    const T = {
      creme:     '#F5EFDF',
      parchemin: '#EDE3C8',
      encre:     '#1C1408',
      sepia:     '#6B4F2A',
      rouille:   '#9B3D1A',
      or:        '#C49A2A',
      grisChaud: '#7A6E5F',
    };

    // ── Divider doré ──────────────────────────────────────────────────────────
    function GoldDivider({ style }) {
      return (
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, ...style }}>
          <div style={{ flex: 1, height: 1, background: T.or, opacity: 0.5 }}></div>
          <span style={{ color: T.or, fontSize: 14 }}>✦</span>
          <div style={{ flex: 1, height: 1, background: T.or, opacity: 0.5 }}></div>
        </div>
      );
    }

    // ── Label de section ──────────────────────────────────────────────────────
    function SectionLabel({ children, light }) {
      return (
        <p style={{
          fontFamily: 'Lora, serif',
          fontSize: 10,
          fontWeight: 600,
          letterSpacing: '0.22em',
          textTransform: 'uppercase',
          color: light ? T.or : T.or,
          marginBottom: 12,
        }}>{children}</p>
      );
    }

    // ── Navigation ────────────────────────────────────────────────────────────
    function Nav({ page, setPage, scrolled }) {
      const [mobileOpen, setMobileOpen] = useState(false);
      const navItems = [
        { id: 'accueil',  label: 'Accueil' },
        { id: 'histoire', label: 'Notre histoire' },
        { id: 'videos',   label: 'Vidéos & Entrevues' },
        { id: 'equipe',   label: 'L\'équipe' },
        { id: 'contact',  label: 'Contact' },
      ];

      const bg = scrolled
        ? `rgba(28,20,8,0.97)`
        : 'transparent';

      return (
        <nav style={{
          position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
          background: bg,
          backdropFilter: scrolled ? 'blur(8px)' : 'none',
          transition: 'background 0.4s ease',
          borderBottom: scrolled ? `1px solid rgba(196,154,42,0.2)` : 'none',
        }}>
          <div style={{
            maxWidth: 1200, margin: '0 auto',
            padding: '0 32px',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            height: 68,
          }}>
            {/* Logo small */}
            <button onClick={() => setPage('accueil')} style={{
              background: 'none', border: 'none', cursor: 'pointer',
              display: 'flex', alignItems: 'center', gap: 12,
            }}>
              <img src={(() => { try { const u = getComputedStyle(document.documentElement).getPropertyValue('--logo-url').trim(); return u.replace(/^url\(['"]?/,'').replace(/['"]?\)$/,''); } catch(e) { return 'logo.png'; } })()} alt="SHGB" style={{ height: 36, width: 36, objectFit: 'contain', borderRadius: '50%', background: T.creme, padding: 2 }} />
              <span style={{
                fontFamily: 'Playfair Display, serif',
                fontSize: 13,
                fontWeight: 600,
                color: '#F5EFDF',
                letterSpacing: '0.04em',
                lineHeight: 1.2,
                textAlign: 'left',
              }}>Société Historique<br />du Grand-Bouctouche</span>
            </button>

            {/* Desktop nav */}
            <div style={{ display: 'flex', gap: 4 }}>
              {navItems.map(item => (
                <button key={item.id} onClick={() => setPage(item.id)} style={{
                  background: 'none', border: 'none', cursor: 'pointer',
                  fontFamily: 'Lora, serif',
                  fontSize: 13,
                  fontWeight: page === item.id ? 600 : 400,
                  color: page === item.id ? T.or : '#F5EFDF',
                  padding: '6px 14px',
                  borderRadius: 4,
                  transition: 'color 0.2s',
                  letterSpacing: '0.02em',
                }}>
                  {item.label}
                  {page === item.id && (
                    <div style={{
                      height: 1, background: T.or,
                      marginTop: 3, borderRadius: 1,
                    }}></div>
                  )}
                </button>
              ))}
            </div>
          </div>
        </nav>
      );
    }

    // ── Page: Accueil ─────────────────────────────────────────────────────────
    function PageAccueil({ setPage }) {
      return (
        <div>
          {/* Hero */}
          <section style={{
            minHeight: '100vh',
            background: T.encre,
            display: 'flex', flexDirection: 'column',
            alignItems: 'center', justifyContent: 'center',
            padding: '120px 32px 80px',
            position: 'relative',
            overflow: 'hidden',
          }}>
            {/* Texture subtile */}
            <div style={{
              position: 'absolute', inset: 0,
              backgroundImage: `radial-gradient(ellipse 80% 60% at 50% 40%, rgba(196,154,42,0.07) 0%, transparent 70%)`,
              pointerEvents: 'none',
            }}></div>

            {/* Filet haut */}
            <div style={{
              position: 'absolute', top: 32, left: 64, right: 64,
              height: 1, background: `linear-gradient(to right, transparent, ${T.or}60, transparent)`,
            }}></div>

            {/* Médaillon logo */}
            <div style={{
              width: 200, height: 200,
              borderRadius: '50%',
              border: `2px solid ${T.or}`,
              padding: 6,
              marginBottom: 40,
              boxShadow: `0 0 0 1px ${T.or}40, 0 8px 40px rgba(0,0,0,0.4)`,
              background: T.creme,
              overflow: 'hidden',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <img src={(() => { try { const u = getComputedStyle(document.documentElement).getPropertyValue('--logo-url').trim(); return u.replace(/^url\(['"]?/,'').replace(/['"]?\)$/,''); } catch(e) { return 'logo.png'; } })()} alt="Société Historique du Grand-Bouctouche"
                style={{
                  width: '90%', height: '90%',
                  objectFit: 'contain',
                }}
              />
            </div>

            <SectionLabel light>Grand-Bouctouche · Nouveau-Brunswick</SectionLabel>

            <h1 style={{
              fontFamily: 'Playfair Display, serif',
              fontSize: 'clamp(32px, 5vw, 58px)',
              fontWeight: 700,
              color: T.creme,
              textAlign: 'center',
              lineHeight: 1.15,
              marginBottom: 12,
              maxWidth: 700,
            }}>
              Société Historique<br />du Grand-Bouctouche
            </h1>

            <p style={{
              fontFamily: 'Lora, serif',
              fontSize: 16,
              fontStyle: 'italic',
              color: T.or,
              textAlign: 'center',
              marginBottom: 48,
              letterSpacing: '0.02em',
            }}>
              Nos mémoires sont vivantes. Ce site les porte.
            </p>

            <GoldDivider style={{ width: '100%', maxWidth: 480, marginBottom: 48 }} />

            {/* 3 engagements */}
            <div style={{
              display: 'flex', gap: 32, flexWrap: 'wrap',
              justifyContent: 'center', maxWidth: 900,
              marginBottom: 64,
            }}>
              {[
                { titre: 'Célébrer', texte: 'Honorer les personnes, les lieux et les récits qui ont bâti le Grand-Bouctouche.' },
                { titre: 'Transmettre', texte: 'Partager cet héritage vivant avec les générations d\'aujourd\'hui et de demain.' },
                { titre: 'Rassembler', texte: 'Unir les citoyens autour d\'une mémoire collective partagée.' },
              ].map(e => (
                <div key={e.titre} style={{
                  flex: '1 1 220px', maxWidth: 260,
                  textAlign: 'center',
                }}>
                  <div style={{
                    width: 40, height: 1, background: T.or,
                    margin: '0 auto 16px',
                  }}></div>
                  <h3 style={{
                    fontFamily: 'Playfair Display, serif',
                    fontSize: 22,
                    fontWeight: 600,
                    color: T.creme,
                    marginBottom: 10,
                  }}>{e.titre}</h3>
                  <p style={{
                    fontFamily: 'Lora, serif',
                    fontSize: 14,
                    color: T.grisChaud,
                    lineHeight: 1.7,
                  }}>{e.texte}</p>
                </div>
              ))}
            </div>

            <button onClick={() => setPage('videos')} style={{
              background: T.rouille,
              color: T.creme,
              border: 'none',
              fontFamily: 'Lora, serif',
              fontSize: 13,
              fontWeight: 600,
              letterSpacing: '0.12em',
              textTransform: 'uppercase',
              padding: '14px 36px',
              cursor: 'pointer',
              transition: 'background 0.2s, transform 0.2s',
            }}
              onMouseEnter={e => e.currentTarget.style.background = '#7A2E12'}
              onMouseLeave={e => e.currentTarget.style.background = T.rouille}
            >
              Voir nos entrevues
            </button>

            {/* Filet bas */}
            <div style={{
              position: 'absolute', bottom: 32, left: 64, right: 64,
              height: 1, background: `linear-gradient(to right, transparent, ${T.or}60, transparent)`,
            }}></div>
          </section>

          {/* Citation */}
          <section style={{
            background: T.parchemin,
            padding: '80px 32px',
            textAlign: 'center',
          }}>
            <GoldDivider style={{ maxWidth: 320, margin: '0 auto 48px' }} />
            <blockquote style={{
              fontFamily: 'Playfair Display, serif',
              fontSize: 'clamp(18px, 2.5vw, 26px)',
              fontStyle: 'italic',
              color: T.sepia,
              maxWidth: 720,
              margin: '0 auto 24px',
              lineHeight: 1.6,
            }}>
              « Connaître son passé, c'est savoir d'où l'on vient —<br />
              et se donner les moyens de choisir où l'on va. »
            </blockquote>
            <GoldDivider style={{ maxWidth: 320, margin: '0 auto 0' }} />
          </section>

          {/* Domaines */}
          <section style={{ background: T.creme, padding: '80px 32px' }}>
            <div style={{ maxWidth: 1100, margin: '0 auto' }}>
              <SectionLabel>Nos domaines</SectionLabel>
              <h2 style={{
                fontFamily: 'Playfair Display, serif',
                fontSize: 'clamp(24px, 3vw, 38px)',
                fontWeight: 700, color: T.encre,
                marginBottom: 48,
              }}>Huit chapitres de notre histoire</h2>

              <div style={{
                display: 'grid',
                gridTemplateColumns: 'repeat(auto-fill, minmax(240px, 1fr))',
                gap: 2,
              }}>
                {[
                  { num: '01', titre: 'Sécurité publique', desc: 'L\'ordre public et la garde civile.' },
                  { num: '02', titre: 'Culture & Arts', desc: 'Théâtre, musique, artisanat et festivités.' },
                  { num: '03', titre: 'Sports', desc: 'Équipes et moments de fierté collective.' },
                  { num: '04', titre: 'Éducation', desc: 'Écoles et institutions d\'apprentissage.' },
                  { num: '05', titre: 'Religion', desc: 'La vie paroissiale et les communautés religieuses.' },
                  { num: '06', titre: 'Pêches', desc: 'La mer, les homardiers et les traditions maritimes.' },
                  { num: '07', titre: 'Agriculture', desc: 'Les terres cultivées et les familles paysannes.' },
                  { num: '08', titre: 'Industrie & Commerce', desc: 'Les entrepreneurs et l\'économie locale.' },
                ].map(d => (
                  <div key={d.num} style={{
                    background: T.parchemin,
                    padding: '28px 24px',
                    cursor: 'default',
                    transition: 'background 0.2s',
                    borderLeft: `3px solid ${T.or}`,
                  }}
                    onMouseEnter={e => e.currentTarget.style.background = '#E6D9B8'}
                    onMouseLeave={e => e.currentTarget.style.background = T.parchemin}
                  >
                    <span style={{
                      fontFamily: 'Lora, serif', fontSize: 10,
                      fontWeight: 600, letterSpacing: '0.18em',
                      color: T.or, display: 'block', marginBottom: 8,
                    }}>{d.num}</span>
                    <h3 style={{
                      fontFamily: 'Playfair Display, serif',
                      fontSize: 17, fontWeight: 600,
                      color: T.encre, marginBottom: 8,
                    }}>{d.titre}</h3>
                    <p style={{
                      fontFamily: 'Lora, serif', fontSize: 13,
                      color: T.sepia, lineHeight: 1.65,
                    }}>{d.desc}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* CTA vers vidéos */}
          <section style={{
            background: T.encre,
            padding: '80px 32px',
            textAlign: 'center',
            position: 'relative',
          }}>
            <div style={{
              position: 'absolute', inset: 0,
              backgroundImage: `radial-gradient(ellipse 60% 60% at 50% 50%, rgba(196,154,42,0.06) 0%, transparent 70%)`,
              pointerEvents: 'none',
            }}></div>
            <SectionLabel light>Témoignages vivants</SectionLabel>
            <h2 style={{
              fontFamily: 'Playfair Display, serif',
              fontSize: 'clamp(24px, 3vw, 38px)',
              fontWeight: 700, color: T.creme,
              marginBottom: 20, maxWidth: 600, margin: '0 auto 20px',
            }}>Entrevues & récits de notre communauté</h2>
            <p style={{
              fontFamily: 'Lora, serif', fontSize: 15,
              color: T.grisChaud, maxWidth: 560,
              margin: '0 auto 36px', lineHeight: 1.75,
            }}>
              Des témoins précieux nous confient leurs récits pour les générations futures.
              Découvrez nos entrevues vidéo sur la vie et l'histoire du Grand-Bouctouche.
            </p>
            <button onClick={() => setPage('videos')} style={{
              background: 'transparent',
              color: T.or,
              border: `1px solid ${T.or}`,
              fontFamily: 'Lora, serif',
              fontSize: 13, fontWeight: 600,
              letterSpacing: '0.12em', textTransform: 'uppercase',
              padding: '13px 36px', cursor: 'pointer',
              transition: 'all 0.2s',
            }}
              onMouseEnter={e => { e.currentTarget.style.background = T.or; e.currentTarget.style.color = T.encre; }}
              onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; e.currentTarget.style.color = T.or; }}
            >
              Voir toutes les entrevues
            </button>
          </section>
        </div>
      );
    }

    // ── Page: Notre histoire ──────────────────────────────────────────────────
    function PageHistoire() {
      return (
        <div style={{ paddingTop: 68 }}>
          {/* En-tête */}
          <section style={{
            background: T.encre, padding: '80px 32px 64px',
            textAlign: 'center',
          }}>
            <SectionLabel light>Section 01</SectionLabel>
            <h1 style={{
              fontFamily: 'Playfair Display, serif',
              fontSize: 'clamp(28px, 4vw, 52px)',
              fontWeight: 700, color: T.creme, marginBottom: 16,
            }}>Notre histoire & identité</h1>
            <GoldDivider style={{ maxWidth: 300, margin: '0 auto' }} />
          </section>

          {/* Mission */}
          <section style={{ background: T.creme, padding: '80px 32px' }}>
            <div style={{ maxWidth: 800, margin: '0 auto' }}>
              <SectionLabel>Mission</SectionLabel>
              <h2 style={{
                fontFamily: 'Playfair Display, serif',
                fontSize: 32, fontWeight: 700, color: T.encre, marginBottom: 24,
              }}>Une organisation née d'un élan du cœur</h2>
              <p style={{
                fontFamily: 'Lora, serif', fontSize: 16, color: T.sepia,
                lineHeight: 1.85, marginBottom: 24,
              }}>
                La Société Historique du Grand-Bouctouche est née de l'engagement de citoyennes 
                et citoyens convaincus que leur région mérite d'être racontée, célébrée et transmise. 
                Organisation citoyenne et non commerciale, elle documente l'histoire vivante du 
                Grand-Bouctouche, au Nouveau-Brunswick.
              </p>
              <p style={{
                fontFamily: 'Lora, serif', fontSize: 16, color: T.sepia,
                lineHeight: 1.85,
              }}>
                Chaque témoignage recueilli est une victoire pour notre communauté. 
                Chaque photo partagée, chaque document confié — c'est notre identité collective 
                qui prend forme et qui rayonne.
              </p>
            </div>
          </section>

          {/* 3 engagements détaillés */}
          <section style={{ background: T.parchemin, padding: '80px 32px' }}>
            <div style={{ maxWidth: 1100, margin: '0 auto' }}>
              <SectionLabel>Engagements</SectionLabel>
              <h2 style={{
                fontFamily: 'Playfair Display, serif',
                fontSize: 32, fontWeight: 700, color: T.encre, marginBottom: 48,
              }}>Trois engagements fondamentaux</h2>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 32 }}>
                {[
                  {
                    titre: 'Célébrer',
                    texte: 'Honorer les personnes, les lieux et les récits qui ont bâti le Grand-Bouctouche, avec fierté et gratitude. Notre région a une histoire riche qui mérite d\'être célébrée à sa juste valeur.',
                  },
                  {
                    titre: 'Transmettre',
                    texte: 'Partager cet héritage vivant avec les générations d\'aujourd\'hui et de demain, pour qu\'il continue de rayonner. Chaque entrevue, chaque document préservé est un pont entre hier et demain.',
                  },
                  {
                    titre: 'Rassembler',
                    texte: 'Unir les citoyens autour d\'une mémoire collective partagée, source d\'appartenance et d\'identité commune. La Société est un lieu de rencontre pour tous ceux qui aiment le Grand-Bouctouche.',
                  },
                ].map(e => (
                  <div key={e.titre} style={{
                    background: T.creme, padding: '36px 28px',
                    borderTop: `3px solid ${T.or}`,
                  }}>
                    <h3 style={{
                      fontFamily: 'Playfair Display, serif',
                      fontSize: 24, fontWeight: 700,
                      color: T.encre, marginBottom: 16,
                    }}>{e.titre}</h3>
                    <p style={{
                      fontFamily: 'Lora, serif', fontSize: 14,
                      color: T.sepia, lineHeight: 1.8,
                    }}>{e.texte}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* 8 domaines */}
          <section style={{ background: T.creme, padding: '80px 32px' }}>
            <div style={{ maxWidth: 1100, margin: '0 auto' }}>
              <SectionLabel>Domaines couverts</SectionLabel>
              <h2 style={{
                fontFamily: 'Playfair Display, serif',
                fontSize: 32, fontWeight: 700, color: T.encre, marginBottom: 48,
              }}>Huit chapitres de la vie communautaire</h2>

              {[
                { num: '01', titre: 'Sécurité publique', desc: 'L\'arrivée des premiers policiers, la mise en place de la garde civile et l\'histoire de l\'ordre public qui a permis à notre communauté de s\'épanouir.' },
                { num: '02', titre: 'Culture & Arts', desc: 'La vie culturelle bouctouchoise dans toute sa vivacité : théâtre amateur, musique traditionnelle, artisanat et festivités qui font vibrer notre région.' },
                { num: '03', titre: 'Sports', desc: 'Les équipes, les champions et les moments de fierté collective qui ont uni les familles du Grand-Bouctouche autour d\'une passion commune.' },
                { num: '04', titre: 'Éducation', desc: 'Les écoles, les enseignants dévoués et les institutions d\'apprentissage qui ont façonné des générations de citoyens engagés.' },
                { num: '05', titre: 'Religion', desc: 'La vie paroissiale, les communautés religieuses et le rôle essentiel du clergé dans le tissu social et culturel de notre région.' },
                { num: '06', titre: 'Pêches', desc: 'La relation profonde de notre communauté avec la mer : les homardiers, les familles de pêcheurs et les traditions maritimes qui nous définissent.' },
                { num: '07', titre: 'Agriculture', desc: 'Les terres cultivées avec passion, les familles paysannes et l\'évolution des pratiques agricoles qui ont nourri et bâti notre région.' },
                { num: '08', titre: 'Industrie & Commerce', desc: 'Les entrepreneurs d\'époque, les premiers commerces et l\'économie locale qui ont permis au Grand-Bouctouche de prospérer et de grandir.' },
              ].map((d, i) => (
                <div key={d.num} style={{
                  display: 'flex', gap: 32, alignItems: 'flex-start',
                  padding: '28px 0',
                  borderBottom: i < 7 ? `1px solid ${T.parchemin}` : 'none',
                }}>
                  <span style={{
                    fontFamily: 'Playfair Display, serif',
                    fontSize: 36, fontWeight: 700,
                    color: T.or, opacity: 0.6,
                    minWidth: 60, lineHeight: 1,
                    fontStyle: 'italic',
                  }}>{d.num}</span>
                  <div>
                    <h3 style={{
                      fontFamily: 'Playfair Display, serif',
                      fontSize: 20, fontWeight: 600,
                      color: T.encre, marginBottom: 8,
                    }}>{d.titre}</h3>
                    <p style={{
                      fontFamily: 'Lora, serif', fontSize: 14,
                      color: T.sepia, lineHeight: 1.75,
                      maxWidth: 680,
                    }}>{d.desc}</p>
                  </div>
                </div>
              ))}

              <blockquote style={{
                fontFamily: 'Playfair Display, serif',

                        onChange={e => setForm(p => ({ ...p, message: e.target.value }))}
                        style={{
                          width: '100%',
                          background: T.parchemin,
                          border: `1px solid ${T.or}30`,
                          fontFamily: 'Lora, serif', fontSize: 14,
                          color: T.encre, padding: '10px 14px',
                          resize: 'vertical', outline: 'none',
                        }}
                        onFocus={e => e.target.style.borderColor = T.or}
                        onBlur={e => e.target.style.borderColor = `${T.or}30`}
                      />
                    </div>
                    <button type="submit" style={{
                      background: T.rouille, color: T.creme,
                      border: 'none',
                      fontFamily: 'Lora, serif', fontSize: 13,
                      fontWeight: 600, letterSpacing: '0.12em',
                      textTransform: 'uppercase',
                      padding: '14px', cursor: 'pointer',
                      transition: 'background 0.2s',
                      alignSelf: 'flex-start', minWidth: 200,
                    }}
                      onMouseEnter={e => e.currentTarget.style.background = '#7A2E12'}
                      onMouseLeave={e => e.currentTarget.style.background = T.rouille}
                    >
                      Envoyer le message
                    </button>
                  </form>
                )}
              </div>
            </div>
          </section>
        </div>
      );
    }

    // ── Footer ────────────────────────────────────────────────────────────────
    function Footer({ setPage }) {
      return (
        <footer style={{
          background: T.encre,
          padding: '48px 32px 32px',
          borderTop: `1px solid ${T.or}20`,
        }}>
          <div style={{
            maxWidth: 1100, margin: '0 auto',
            display: 'grid', gridTemplateColumns: '1fr 1fr 1fr',
            gap: 48, marginBottom: 40,
          }}>
            {/* Logo + nom */}
            <div>
              <img src={(() => { try { const u = getComputedStyle(document.documentElement).getPropertyValue('--logo-url').trim(); return u.replace(/^url\(['"]?/,'').replace(/['"]?\)$/,''); } catch(e) { return 'logo.png'; } })()} alt="SHGB"
                style={{
                  height: 80, width: 80,
                  objectFit: 'contain',
                  borderRadius: '50%',
                  background: T.creme,
                  padding: 4,
                  marginBottom: 16, display: 'block',
                }}
              />
              <p style={{
                fontFamily: 'Lora, serif', fontSize: 13,
                color: T.grisChaud, lineHeight: 1.7,
              }}>
                Société Historique du Grand-Bouctouche<br />
                Grand-Bouctouche, Nouveau-Brunswick
              </p>
            </div>

            {/* Navigation */}
            <div>
              <p style={{
                fontFamily: 'Lora, serif', fontSize: 10,
                fontWeight: 600, letterSpacing: '0.18em',
                textTransform: 'uppercase', color: T.or,
                marginBottom: 16,
              }}>Navigation</p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {[
                  { id: 'accueil', label: 'Accueil' },
                  { id: 'histoire', label: 'Notre histoire' },
                  { id: 'videos', label: 'Vidéos & Entrevues' },
                  { id: 'equipe', label: 'L\'équipe' },
                  { id: 'contact', label: 'Contact' },
                ].map(item => (
                  <button key={item.id} onClick={() => setPage(item.id)} style={{
                    background: 'none', border: 'none', cursor: 'pointer',
                    fontFamily: 'Lora, serif', fontSize: 13,
                    color: T.grisChaud, textAlign: 'left',
                    padding: 0, transition: 'color 0.2s',
                  }}
                    onMouseEnter={e => e.currentTarget.style.color = T.creme}
                    onMouseLeave={e => e.currentTarget.style.color = T.grisChaud}
                  >{item.label}</button>
                ))}
              </div>
            </div>

            {/* Contact rapide */}
            <div>
              <p style={{
                fontFamily: 'Lora, serif', fontSize: 10,
                fontWeight: 600, letterSpacing: '0.18em',
                textTransform: 'uppercase', color: T.or,
                marginBottom: 16,
              }}>Contact</p>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                <a href="tel:5067438517" style={{
                  fontFamily: 'Lora, serif', fontSize: 13,
                  color: T.grisChaud, textDecoration: 'none',
                }}>506-743-8517</a>
                <a href="mailto:paulinebast@hotmail.com" style={{
                  fontFamily: 'Lora, serif', fontSize: 13,
                  color: T.grisChaud, textDecoration: 'none',
                }}>paulinebast@hotmail.com</a>
              </div>
            </div>
          </div>

          <GoldDivider />

          <div style={{
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            marginTop: 24, flexWrap: 'wrap', gap: 12,
          }}>
            <p style={{
              fontFamily: 'Lora, serif', fontSize: 12,
              color: T.grisChaud,
            }}>
              © 2025 Société Historique du Grand-Bouctouche. Tous droits réservés.
            </p>
            <p style={{
              fontFamily: 'Lora, serif', fontSize: 11,
              color: `${T.grisChaud}80`, fontStyle: 'italic',
            }}>
              Notre mémoire est un trésor vivant. ✦
            </p>
          </div>
        </footer>
      );
    }

    // ── App principal ─────────────────────────────────────────────────────────
    function App() {
      const [page, setPage] = useState('accueil');
      useEffect(() => { window.__setPage = setPage; return () => { delete window.__setPage; }; }, [setPage]);
      const [scrolled, setScrolled] = useState(false);

      const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
        "accentColor": "#9B3D1A",
        "fontStyle": "serif",
        "heroDark": true
      }/*EDITMODE-END*/;

      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 40);
        window.addEventListener('scroll', handleScroll, { passive: true });
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      // Scroll to top on page change
      useEffect(() => {
        window.scrollTo({ top: 0, behavior: 'instant' });
      }, [page]);

      const pageContent = () => {
        switch (page) {
          case 'accueil':  return <PageAccueil setPage={setPage} />;
          case 'histoire': return <PageHistoire />;
          case 'videos':   return <PageVideos />;
          case 'equipe':   return <PageEquipe />;
          case 'contact':  return <PageContact />;
          default:         return <PageAccueil setPage={setPage} />;
        }
      };

      return (
        <div>
          <Nav page={page} setPage={setPage} scrolled={page !== 'accueil' || scrolled} />
          <main>{pageContent()}</main>
          <Footer setPage={setPage} />

          <TweaksPanel>
            <TweakSection label="Couleur d'accent">
              <TweakColor
                label="Rouille / CTA"
                tweakKey="accentColor"
                value={tweaks.accentColor}
                onChange={v => setTweak('accentColor', v)}
              />
            </TweakSection>
            <TweakSection label="Style">
              <TweakToggle
                label="Hero sombre"
                tweakKey="heroDark"
                value={tweaks.heroDark}
                onChange={v => setTweak('heroDark', v)}
              />
              <TweakRadio
                label="Police"
                tweakKey="fontStyle"
                value={tweaks.fontStyle}
                options={[{ value: 'serif', label: 'Lora' }, { value: 'display', label: 'Playfair' }]}
                onChange={v => setTweak('fontStyle', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
